{% extends "layouts/auth_base.html" %}

{% block title %}Login{% endblock %}

{% block content %}

<h1>Login Page</h1>

<form method="post">
    {% csrf_token %}

    <input type="text" placeholder="Username">

    <br><br>

    <input type="password" placeholder="Password">

    <br><br>

    <button type="submit">Login</button>
</form>

{% endblock %}
